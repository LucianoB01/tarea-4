<div class="usuarios-container">
    <div class="header">
        <h1>Gestión de Usuarios</h1>
        <button class="btn-primary" (click)="agregarUsuarioSimulado()">+ Agregar Usuario Aleatorio</button>
    </div>

    @if(usuarios.length > 0){
        <div class="usuarios-grid">
            @for(usuario of usuarios; track usuario.id){
                <div class="usuario-card">
                    <h2>{{usuario.nombre}}</h2>
                    <div class="usuario-details">
                        <span><strong>Rol:</strong> {{ usuario.rol }}</span>
                        <span><strong>Email:</strong> {{ usuario.email }}</span>
                    </div>
                    <button class="btn-danger" (click)="eliminarUsuario(usuario.id)">
                        Eliminar
                    </button>
                </div>
            }
        </div>
    } @else {
        <div class="empty-state">
            <p>No hay usuarios registrados en el sistema.</p>
        </div>
    }
</div>
